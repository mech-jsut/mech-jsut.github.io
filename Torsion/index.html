<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>材料力学 · 圆轴扭转 · 12直径加粗</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background-color: #f0f4fa;
        }
        #controls-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 12px 15px;
            border-radius: 12px;
            color: #2c3e50;
            border: 1px solid #d0ddee;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            z-index: 30;
            width: 160px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.98);
            font-size: 0.85rem;
        }
        #controls-panel h4 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            font-weight: 500;
            color: #1e4b6e;
            border-bottom: 2px solid #3a7ca5;
            padding-bottom: 5px;
            letter-spacing: 0.3px;
        }
        .slider-item {
            margin-bottom: 10px;
        }
        .slider-item label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
            color: #2c3e50;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .slider-item input {
            width: 100%;
            cursor: pointer;
            accent-color: #3a7ca5;
            height: 4px;
            border-radius: 10px;
        }
        .value-badge {
            background: #eef3f8;
            padding: 2px 8px;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #1e4b6e;
            font-weight: 600;
        }
        .angle-display {
            background: #1e4b6e;
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 8px;
            border: 1px solid #ffaa66;
        }
        .angle-display span {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffaa66;
        }
        #note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #2c3e50;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid #d0ddee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            z-index: 15;
            backdrop-filter: blur(5px);
        }
        .status-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 8px 15px;
            border-radius: 12px;
            border-left: 4px solid #3a7ca5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            color: #1e3b5c;
            font-size: 0.9rem;
            z-index: 20;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
        }
        .status-badge span {
            font-weight: 600;
            color: #3a7ca5;
            background: #e8f0fe;
            padding: 2px 8px;
            border-radius: 30px;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="status-badge">
        <span>✓ 12直径加粗</span> 鲜艳红色 · 与网格线对应
    </div>
    <div id="controls-panel">
        <h4>🎮 扭转控制</h4>
        <div class="slider-item">
            <label>
                <span>扭转角</span>
                <span id="angle-value" class="value-badge">0°</span>
            </label>
            <input type="range" id="angle-slider" min="0" max="60" value="0" step="1">
        </div>
        <div class="slider-item">
            <label>
                <span>切片位置</span>
                <span id="slice-value" class="value-badge">0.00</span>
            </label>
            <input type="range" id="slice-slider" min="-2.5" max="2.5" step="0.05" value="0.0">
        </div>
        <div class="angle-display">
            当前 <span id="angle-display">0°</span>
        </div>
    </div>
    <div id="note">
        🖱️ 鼠标拖拽旋转 | 滑块手动控制
    </div>

    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f4fa);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 12);
        camera.lookAt(0, 0, 0);

        // --- 渲染器 ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- CSS2渲染器 (用于标签) ---
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- 控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(3, 8, 5);
        scene.add(dirLight1);
        
        const dirLight2 = new THREE.DirectionalLight(0xfff5f0, 0.6);
        dirLight2.position.set(-4, 3, -5);
        scene.add(dirLight2);

        // 添加一个淡淡的背景网格
        const gridHelper = new THREE.GridHelper(16, 20, 0xa0b8d0, 0xc8d8e8);
        gridHelper.position.y = -2.5;
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // ========== 核心参数 ==========
        const radius = 2.0;
        const length = 6.0;
        const halfL = 3.0;
        const radialSegments = 24;  // 圆周分段数
        const axialSegments = 16;    // 轴向分段数

        // ========== 创建带网格线的蓝色圆轴 ==========
        // 创建基础圆柱并旋转使轴向为X
        const baseGeo = new THREE.CylinderGeometry(radius, radius, length, radialSegments, axialSegments);
        baseGeo.applyMatrix4(new THREE.Matrix4().makeRotationZ(-Math.PI / 2));
        
        // 获取顶点数据
        const positionAttribute = baseGeo.attributes.position;
        const originalPositions = positionAttribute.array.slice();
        
        // 创建用于动画的几何体
        const animGeo = new THREE.BufferGeometry();
        animGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(originalPositions.length), 3));
        animGeo.setIndex(baseGeo.index);
        animGeo.setAttribute('normal', baseGeo.attributes.normal.clone());
        
        // 蓝色半透明材质
        const material = new THREE.MeshPhongMaterial({
            color: 0x3a7ca5,
            transparent: true,
            opacity: 0.65,
            shininess: 30,
            side: THREE.DoubleSide,
            wireframe: false,
            emissive: 0x000000
        });
        
        const cylinder = new THREE.Mesh(animGeo, material);
        scene.add(cylinder);

        // ========== 创建表面网格线 ==========
        // 纵向线
        const longitudinalLines = [];
        for (let i = 0; i <= radialSegments; i++) {
            const points = [];
            for (let j = 0; j <= axialSegments; j++) {
                const idx = j * (radialSegments + 1) + i;
                const x = originalPositions[idx * 3];
                const y = originalPositions[idx * 3 + 1];
                const z = originalPositions[idx * 3 + 2];
                points.push(new THREE.Vector3(x, y, z));
            }
            
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
            const line = new THREE.Line(lineGeo, lineMat);
            scene.add(line);
            
            longitudinalLines.push({
                line,
                radialIndex: i
            });
        }

        // 横向线
        const circumferentialLines = [];
        for (let j = 0; j <= axialSegments; j++) {
            const points = [];
            for (let i = 0; i <= radialSegments; i++) {
                const idx = j * (radialSegments + 1) + i;
                const x = originalPositions[idx * 3];
                const y = originalPositions[idx * 3 + 1];
                const z = originalPositions[idx * 3 + 2];
                points.push(new THREE.Vector3(x, y, z));
            }
            // 闭合圆周
            const firstIdx = j * (radialSegments + 1);
            points.push(new THREE.Vector3(
                originalPositions[firstIdx * 3],
                originalPositions[firstIdx * 3 + 1],
                originalPositions[firstIdx * 3 + 2]
            ));
            
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
            const line = new THREE.Line(lineGeo, lineMat);
            scene.add(line);
            
            circumferentialLines.push({
                line,
                axialIndex: j
            });
        }

        // 存储原始顶点数据用于更新
        const vertexData = [];
        for (let i = 0; i < originalPositions.length; i += 3) {
            vertexData.push({
                x: originalPositions[i],
                y: originalPositions[i+1],
                z: originalPositions[i+2]
            });
        }

        // ========== 动态切片 - 圆环 + 12条直径 ==========
        const sliceColor = 0xff3366; // 更鲜艳的红色
        
        // 1. 红色圆环 - 加粗
        const ringPoints = [];
        const ringSegments = 64;
        for (let i = 0; i <= ringSegments; i++) {
            const angle = (i / ringSegments) * Math.PI * 2;
            const y = radius * Math.cos(angle);
            const z = radius * Math.sin(angle);
            ringPoints.push(new THREE.Vector3(0, y, z));
        }
        const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPoints);
        // 使用LineSegments无法直接加粗，但可以通过创建多条重叠线条模拟加粗效果
        // 或者使用THREE.Line + linewidth，但linewidth在WebGL中支持有限
        // 这里采用创建两条略微偏移的线条来模拟加粗
        const ringMat = new THREE.LineBasicMaterial({ color: sliceColor });
        const ringLine = new THREE.Line(ringGeo, ringMat);
        scene.add(ringLine);
        
        // 添加第二条稍微放大的圆环来模拟加粗效果
        const ringPoints2 = [];
        const expand = 0.03;
        for (let i = 0; i <= ringSegments; i++) {
            const angle = (i / ringSegments) * Math.PI * 2;
            const y = (radius + expand) * Math.cos(angle);
            const z = (radius + expand) * Math.sin(angle);
            ringPoints2.push(new THREE.Vector3(0, y, z));
        }
        const ringGeo2 = new THREE.BufferGeometry().setFromPoints(ringPoints2);
        const ringLine2 = new THREE.Line(ringGeo2, ringMat);
        scene.add(ringLine2);
        
        // 再添加一条稍微缩小的
        const ringPoints3 = [];
        for (let i = 0; i <= ringSegments; i++) {
            const angle = (i / ringSegments) * Math.PI * 2;
            const y = (radius - expand) * Math.cos(angle);
            const z = (radius - expand) * Math.sin(angle);
            ringPoints3.push(new THREE.Vector3(0, y, z));
        }
        const ringGeo3 = new THREE.BufferGeometry().setFromPoints(ringPoints3);
        const ringLine3 = new THREE.Line(ringGeo3, ringMat);
        scene.add(ringLine3);

        // 2. 12条直径 (与纵向网格线完全对应)
        const diameterLines = [];
        const numDiameters = 12;
        for (let i = 0; i < numDiameters; i++) {
            const angle = (i / numDiameters) * Math.PI * 2;
            const y1 = radius * Math.cos(angle);
            const z1 = radius * Math.sin(angle);
            const y2 = -y1;
            const z2 = -z1;
            
            // 创建两条平行线来模拟加粗
            const offset = 0.03;
            const perpY = -Math.sin(angle) * offset;
            const perpZ = Math.cos(angle) * offset;
            
            // 第一条线
            const points1 = [
                new THREE.Vector3(0, y1 + perpY, z1 + perpZ),
                new THREE.Vector3(0, y2 + perpY, z2 + perpZ)
            ];
            const lineGeo1 = new THREE.BufferGeometry().setFromPoints(points1);
            const lineMat1 = new THREE.LineBasicMaterial({ color: sliceColor });
            const line1 = new THREE.Line(lineGeo1, lineMat1);
            scene.add(line1);
            
            // 第二条线 (中心线)
            const points2 = [
                new THREE.Vector3(0, y1, z1),
                new THREE.Vector3(0, y2, z2)
            ];
            const lineGeo2 = new THREE.BufferGeometry().setFromPoints(points2);
            const lineMat2 = new THREE.LineBasicMaterial({ color: sliceColor });
            const line2 = new THREE.Line(lineGeo2, lineMat2);
            scene.add(line2);
            
            // 第三条线
            const points3 = [
                new THREE.Vector3(0, y1 - perpY, z1 - perpZ),
                new THREE.Vector3(0, y2 - perpY, z2 - perpZ)
            ];
            const lineGeo3 = new THREE.BufferGeometry().setFromPoints(points3);
            const lineMat3 = new THREE.LineBasicMaterial({ color: sliceColor });
            const line3 = new THREE.Line(lineGeo3, lineMat3);
            scene.add(line3);
            
            diameterLines.push({
                lines: [line1, line2, line3],
                startY: y1, startZ: z1,
                endY: y2, endZ: z2,
                perpY, perpZ
            });
        }

        // ========== UI控制 ==========
        const angleSlider = document.getElementById('angle-slider');
        const angleValue = document.getElementById('angle-value');
        const angleDisplay = document.getElementById('angle-display');
        const sliceSlider = document.getElementById('slice-slider');
        const sliceValue = document.getElementById('slice-value');

        let currentAngle = 0;
        let slicePos = 0.0;

        angleSlider.addEventListener('input', (e) => {
            currentAngle = parseFloat(e.target.value);
            angleValue.textContent = currentAngle + '°';
            angleDisplay.textContent = currentAngle + '°';
        });

        sliceSlider.addEventListener('input', (e) => {
            slicePos = parseFloat(e.target.value);
            sliceValue.textContent = slicePos.toFixed(2);
        });

        // ========== 动画循环 ==========
        const positionArray = animGeo.attributes.position.array;

        function updateGeometry() {
            const angleRad = currentAngle * Math.PI / 180;
            
            // 更新蓝色圆轴顶点
            for (let i = 0; i < vertexData.length; i++) {
                const v = vertexData[i];
                const x = v.x;
                
                const t = (x + halfL) / (2.0 * halfL);
                const twistAngle = angleRad * Math.max(0, Math.min(1, t));
                
                const cosA = Math.cos(twistAngle);
                const sinA = Math.sin(twistAngle);
                
                const newY = v.y * cosA - v.z * sinA;
                const newZ = v.y * sinA + v.z * cosA;
                
                positionArray[i*3] = x;
                positionArray[i*3+1] = newY;
                positionArray[i*3+2] = newZ;
            }
            animGeo.attributes.position.needsUpdate = true;
            animGeo.computeVertexNormals();

            // 更新纵向网格线
            for (let ri = 0; ri <= radialSegments; ri++) {
                const lineData = longitudinalLines[ri];
                const points = [];
                for (let aj = 0; aj <= axialSegments; aj++) {
                    const idx = aj * (radialSegments + 1) + ri;
                    points.push(new THREE.Vector3(
                        positionArray[idx * 3],
                        positionArray[idx * 3 + 1],
                        positionArray[idx * 3 + 2]
                    ));
                }
                lineData.line.geometry.dispose();
                lineData.line.geometry = new THREE.BufferGeometry().setFromPoints(points);
            }

            // 更新横向网格线
            for (let aj = 0; aj <= axialSegments; aj++) {
                const lineData = circumferentialLines[aj];
                const points = [];
                for (let ri = 0; ri <= radialSegments; ri++) {
                    const idx = aj * (radialSegments + 1) + ri;
                    points.push(new THREE.Vector3(
                        positionArray[idx * 3],
                        positionArray[idx * 3 + 1],
                        positionArray[idx * 3 + 2]
                    ));
                }
                // 闭合圆周
                const firstIdx = aj * (radialSegments + 1);
                points.push(new THREE.Vector3(
                    positionArray[firstIdx * 3],
                    positionArray[firstIdx * 3 + 1],
                    positionArray[firstIdx * 3 + 2]
                ));
                lineData.line.geometry.dispose();
                lineData.line.geometry = new THREE.BufferGeometry().setFromPoints(points);
            }

            // 更新切片元素
            const tSlice = (slicePos + halfL) / (2.0 * halfL);
            const sliceAngle = angleRad * Math.max(0, Math.min(1, tSlice));
            const cosS = Math.cos(sliceAngle);
            const sinS = Math.sin(sliceAngle);
            
            // 更新三个圆环
            const expands = [0, 0.03, -0.03];
            [ringLine, ringLine2, ringLine3].forEach((ring, idx) => {
                const expand = expands[idx];
                const newPoints = [];
                for (let i = 0; i <= ringSegments; i++) {
                    const angle = (i / ringSegments) * Math.PI * 2;
                    const y = (radius + expand) * Math.cos(angle);
                    const z = (radius + expand) * Math.sin(angle);
                    const newY = y * cosS - z * sinS;
                    const newZ = y * sinS + z * cosS;
                    newPoints.push(new THREE.Vector3(slicePos, newY, newZ));
                }
                ring.geometry.dispose();
                ring.geometry = new THREE.BufferGeometry().setFromPoints(newPoints);
            });

            // 更新直径 (每组3条线)
            diameterLines.forEach(dia => {
                // 旋转基础端点
                const baseStartY = dia.startY * cosS - dia.startZ * sinS;
                const baseStartZ = dia.startY * sinS + dia.startZ * cosS;
                const baseEndY = dia.endY * cosS - dia.endZ * sinS;
                const baseEndZ = dia.endY * sinS + dia.endZ * cosS;
                
                // 计算旋转后的垂直方向
                const perpY_rot = dia.perpY * cosS - dia.perpZ * sinS;
                const perpZ_rot = dia.perpY * sinS + dia.perpZ * cosS;
                
                // 更新三条线
                const points1 = [
                    new THREE.Vector3(slicePos, baseStartY + perpY_rot, baseStartZ + perpZ_rot),
                    new THREE.Vector3(slicePos, baseEndY + perpY_rot, baseEndZ + perpZ_rot)
                ];
                dia.lines[0].geometry.dispose();
                dia.lines[0].geometry = new THREE.BufferGeometry().setFromPoints(points1);
                
                const points2 = [
                    new THREE.Vector3(slicePos, baseStartY, baseStartZ),
                    new THREE.Vector3(slicePos, baseEndY, baseEndZ)
                ];
                dia.lines[1].geometry.dispose();
                dia.lines[1].geometry = new THREE.BufferGeometry().setFromPoints(points2);
                
                const points3 = [
                    new THREE.Vector3(slicePos, baseStartY - perpY_rot, baseStartZ - perpZ_rot),
                    new THREE.Vector3(slicePos, baseEndY - perpY_rot, baseEndZ - perpZ_rot)
                ];
                dia.lines[2].geometry.dispose();
                dia.lines[2].geometry = new THREE.BufferGeometry().setFromPoints(points3);
            });
        }

        function animate() {
            updateGeometry();
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
